<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.T.Q. Framework — Sidebar Nav</title>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { background: #F0EFEB; font-family: 'DM Sans', sans-serif; color: #1B2E4B; display: flex; }

.sidebar { width: 80px; min-height: 100vh; background: #1B2E4B; display: flex; flex-direction: column; align-items: center; padding: 40px 0; position: fixed; left: 0; top: 0; bottom: 0; z-index: 10; }
.sidebar .logo { font-family: 'Chakra Petch', sans-serif; font-size: 11px; font-weight: 700; color: rgba(240,239,235,0.3); letter-spacing: 2px; writing-mode: vertical-rl; text-orientation: mixed; transform: rotate(180deg); margin-bottom: auto; }
.nav-items { display: flex; flex-direction: column; gap: 8px; margin-top: auto; margin-bottom: auto; }
.nav-btn { width: 52px; height: 52px; border-radius: 12px; border: 1.5px solid rgba(240,239,235,0.15); background: transparent; color: rgba(240,239,235,0.5); font-family: 'Chakra Petch', sans-serif; font-size: 22px; font-weight: 700; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; }
.nav-btn:hover { border-color: rgba(240,239,235,0.4); color: rgba(240,239,235,0.8); }
.nav-btn.active { background: rgba(240,239,235,0.12); border-color: rgba(240,239,235,0.3); color: #F0EFEB; }
.sidebar .dot-indicator { width: 4px; height: 4px; border-radius: 50%; background: rgba(240,239,235,0.2); margin-top: auto; }

.main { margin-left: 80px; flex: 1; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 60px 80px; position: relative; overflow: hidden; }
.watermark { position: absolute; right: -40px; top: 50%; transform: translateY(-50%); font-family: 'Chakra Petch', sans-serif; font-size: 420px; font-weight: 700; color: #1B2E4B; opacity: 0.04; line-height: 1; pointer-events: none; transition: opacity 0.4s ease; }
.content { max-width: 600px; position: relative; z-index: 1; }
.label { font-size: 12px; font-weight: 500; letter-spacing: 2.5px; text-transform: uppercase; color: #1B2E4B; opacity: 0.4; margin-bottom: 24px; display: flex; align-items: center; gap: 10px; }
.label::before { content: ''; width: 20px; height: 1.5px; background: #1B2E4B; opacity: 0.5; }
.pillar-title { font-family: 'Chakra Petch', sans-serif; font-weight: 700; font-size: 48px; color: #1B2E4B; margin-bottom: 8px; letter-spacing: -0.5px; opacity: 0; transform: translateY(16px); transition: all 0.5s cubic-bezier(0.4,0,0.2,1); }
.pillar-title.visible { opacity: 1; transform: translateY(0); }
.pillar-subtitle { font-family: 'Chakra Petch', sans-serif; font-size: 16px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: #1B2E4B; opacity: 0.35; margin-bottom: 32px; opacity: 0; transform: translateY(12px); transition: all 0.5s cubic-bezier(0.4,0,0.2,1) 0.08s; }
.pillar-subtitle.visible { opacity: 0.35; transform: translateY(0); }
.pillar-desc { font-size: 18px; line-height: 1.8; color: #1B2E4B; opacity: 0; transform: translateY(12px); transition: all 0.5s cubic-bezier(0.4,0,0.2,1) 0.16s; }
.pillar-desc.visible { opacity: 0.75; transform: translateY(0); }
.divider { width: 48px; height: 2px; background: #1B2E4B; opacity: 0.12; margin-bottom: 32px; opacity: 0; transform: translateY(12px); transition: all 0.5s cubic-bezier(0.4,0,0.2,1) 0.12s; }
.divider.visible { opacity: 0.12; transform: translateY(0); }

@media (max-width: 768px) {
  .sidebar { width: 60px; }
  .main { margin-left: 60px; padding: 40px 32px; }
  .watermark { font-size: 240px; }
  .pillar-title { font-size: 36px; }
}
</style>
</head>
<body>
<nav class="sidebar">
  <div class="logo">STQ</div>
  <div class="nav-items">
    <button class="nav-btn active" data-index="0" onclick="switchPillar(0)">S</button>
    <button class="nav-btn" data-index="1" onclick="switchPillar(1)">T</button>
    <button class="nav-btn" data-index="2" onclick="switchPillar(2)">Q</button>
  </div>
  <div class="dot-indicator"></div>
</nav>
<main class="main">
  <div class="watermark" id="watermark">S.</div>
  <div class="content">
    <div class="label">Our Framework</div>
    <div class="pillar-title" id="title">Strategic</div>
    <div class="pillar-subtitle" id="subtitle">S.</div>
    <div class="divider" id="divider"></div>
    <div class="pillar-desc" id="desc">Tax-aware portfolio construction designed around your full financial picture — investments, real estate, business income, and estate plan working together.</div>
  </div>
</main>
<script>
const pillars = [
  { letter: 'S', title: 'Strategic', desc: 'Tax-aware portfolio construction designed around your full financial picture — investments, real estate, business income, and estate plan working together.' },
  { letter: 'T', title: 'Tactical', desc: 'Dynamic options overlays, advanced tax-loss harvesting, and precision timing to protect downside, generate income, and minimize taxable events.' },
  { letter: 'Q', title: 'Quantitative', desc: 'Institutional-grade analytics applied to after-tax outcomes — because a 12% return that keeps 9% beats a 14% return that keeps 7%.' }
];
let current = 0;
const title = document.getElementById('title');
const subtitle = document.getElementById('subtitle');
const desc = document.getElementById('desc');
const divider = document.getElementById('divider');
const watermark = document.getElementById('watermark');
const btns = document.querySelectorAll('.nav-btn');

function switchPillar(index) {
  if (index === current) return;
  current = index;
  btns.forEach((b, i) => b.classList.toggle('active', i === index));
  // Hide
  [title, subtitle, divider, desc].forEach(el => el.classList.remove('visible'));
  watermark.style.opacity = '0';
  setTimeout(() => {
    const p = pillars[index];
    title.textContent = p.title;
    subtitle.textContent = p.letter + '.';
    desc.textContent = p.desc;
    watermark.textContent = p.letter + '.';
    watermark.style.opacity = '';
    requestAnimationFrame(() => {
      [title, subtitle, divider, desc].forEach(el => el.classList.add('visible'));
    });
  }, 350);
}
// Initial animation
requestAnimationFrame(() => {
  [title, subtitle, divider, desc].forEach(el => el.classList.add('visible'));
});
</script>
</body>
</html>
